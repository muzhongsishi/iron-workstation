<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IW-Next 房间坐标标定工具 🏢</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-color: #3b82f6;
            --success-color: #10b981;
            --text-color: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-h: 100vh;
            overflow-x: hidden;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin: 0;
            color: #94a3b8;
            font-size: 14px;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            align-items: flex-start;
        }

        /* 大楼图片容器 */
        .map-section {
            flex: 2;
            position: relative;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            line-height: 0;
        }

        .map-image {
            width: 100%;
            height: auto;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
            cursor: crosshair;
        }

        /* 脉冲发光定位器 */
        .beacon {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: var(--primary-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            animation: pulse 1.6s infinite cubic-bezier(0.66, 0, 0, 1);
            z-index: 10;
            cursor: pointer;
        }

        .beacon-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        /* 右侧面板 */
        .panel-section {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
        }

        .section-title {
            margin: 0 0 10px 0;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }

        /* 表格样式 */
        .marker-list {
            flex-grow: 1;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 250px;
        }

        .marker-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 13px;
        }

        .marker-item:last-child {
            border-bottom: none;
        }

        .marker-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .marker-name {
            font-weight: bold;
            color: #3b82f6;
        }

        .marker-coords {
            font-family: monospace;
            color: #64748b;
            font-size: 11px;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        /* 导出按钮 */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }

        .output-box {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            color: #a7f3d0;
            white-space: pre-wrap;
            max-height: 120px;
            overflow-y: auto;
            user-select: all;
        }

        /* 输入对话框模拟 */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            gap: 16px;
            z-index: 100;
            max-width: 320px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .modal.active {
            display: flex;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 90;
            display: none;
        }

        .modal-overlay.active {
            display: block;
        }

        .modal-title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }

        .input-field:focus {
            border-color: var(--primary-color);
        }

        .modal-actions {
            display: flex;
            gap: 8px;
        }

        .modal-btn {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }

        .modal-btn-confirm {
            background: var(--primary-color);
            color: white;
        }

        .modal-btn-cancel {
            background: rgba(255,255,255,0.08);
            color: #94a3b8;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>IW-Next 房间坐标标定工具 🏢</h1>
        <p>💡 使用方式：在下方图片中的对应房间位置上<b>直接点击鼠标</b>，输入房间名，然后点击下方绿色按钮保存为配置文件即可！</p>
    </header>

    <div class="container">
        <!-- 地图区域 -->
        <div class="map-section" id="mapSection">
            <img src="./frontend/public/building.png" alt="船池大楼正视图" class="map-image" id="mapImg">
            <!-- 标记点将在这里渲染 -->
        </div>

        <!-- 面板区域 -->
        <div class="panel-section">
            <div>
                <h2 class="section-title">📍 已标记的房间</h2>
                <div class="marker-list" id="markerList">
                    <div style="padding: 20px; text-align: center; color: #64748b; font-size: 13px;" id="emptyText">
                        暂无标记，请在大楼图上点击开始打点
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-success" id="saveBtn">
                    💾 保存标记配置文件 (rooms_config.json)
                </button>
                <div style="font-size: 11px; color: #94a3b8; text-align: center; margin-top: -5px;">
                    点击后请将文件保存到<b>项目根目录</b>下即可！
                </div>
            </div>

            <div>
                <h2 class="section-title">📋 实时 JSON 数据预览</h2>
                <div class="output-box" id="jsonOutput">[]</div>
            </div>
        </div>
    </div>

    <!-- 输入弹窗 -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal" id="inputModal">
        <h3 class="modal-title" id="modalTitle">📌 录入房间/地点名</h3>
        <input type="text" class="input-field" id="roomInput" placeholder="例如：401室, 310, 集群小屋" autofocus>
        <div style="font-size: 11px; color: #64748b; margin-top: -5px;">
            请务必与 <b>硬件信息.md</b> 中的房间名称（如 401, 310）保持一致或包含该关键字。
        </div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="cancelBtn">取消</button>
            <button class="modal-btn modal-btn-confirm" id="confirmBtn">确认添加</button>
        </div>
    </div>

    <script>
        const mapSection = document.getElementById('mapSection');
        const mapImg = document.getElementById('mapImg');
        const markerList = document.getElementById('markerList');
        const emptyText = document.getElementById('emptyText');
        const jsonOutput = document.getElementById('jsonOutput');
        const saveBtn = document.getElementById('saveBtn');

        // 弹窗元素
        const inputModal = document.getElementById('inputModal');
        const modalOverlay = document.getElementById('modalOverlay');
        const roomInput = document.getElementById('roomInput');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        let markers = [];
        let tempCoords = null;

        // 点击大楼打点
        mapImg.addEventListener('click', function(e) {
            const rect = mapImg.getBoundingClientRect();
            // 计算点击位置占图片的百分比
            const left = parseFloat(((e.clientX - rect.left) / rect.width * 100).toFixed(2));
            const top = parseFloat(((e.clientY - rect.top) / rect.height * 100).toFixed(2));

            tempCoords = { left, top };
            
            // 弹出模态框
            showModal();
        });

        // 弹窗操作
        function showModal() {
            inputModal.classList.add('active');
            modalOverlay.classList.add('active');
            roomInput.value = '';
            setTimeout(() => roomInput.focus(), 100);
        }

        function hideModal() {
            inputModal.classList.remove('active');
            modalOverlay.classList.remove('active');
            tempCoords = null;
        }

        cancelBtn.addEventListener('click', hideModal);
        modalOverlay.addEventListener('click', hideModal);

        roomInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                confirmAdd();
            }
        });

        confirmBtn.addEventListener('click', confirmAdd);

        function confirmAdd() {
            const name = roomInput.value.trim();
            if (!name) {
                alert('请输入合法的房间/地点名称！');
                return;
            }

            if (tempCoords) {
                // 添加标记数据
                const newMarker = {
                    id: Date.now(),
                    room: name,
                    top: tempCoords.top,
                    left: tempCoords.left
                };
                markers.push(newMarker);
                
                // 渲染界面
                renderMarkers();
                hideModal();
            }
        }

        // 删除标记
        window.deleteMarker = function(id) {
            markers = markers.filter(m => m.id !== id);
            renderMarkers();
        }

        // 重新渲染全部标记
        function renderMarkers() {
            // 1. 清理图片上的旧点
            const oldBeacons = mapSection.querySelectorAll('.beacon');
            oldBeacons.forEach(b => b.remove());

            // 2. 渲染新点
            markers.forEach(m => {
                const beacon = document.createElement('div');
                beacon.className = 'beacon';
                beacon.style.top = m.top + '%';
                beacon.style.left = m.left + '%';
                
                const label = document.createElement('div');
                label.className = 'beacon-label';
                label.textContent = m.room;
                
                beacon.appendChild(label);
                
                // 点击标记点可定位到列表
                beacon.addEventListener('click', function(e) {
                    e.stopPropagation(); // 防止触发新打点
                    alert(`房间: ${m.room}\n坐标: top: ${m.top}%, left: ${m.left}%`);
                });

                mapSection.appendChild(beacon);
            });

            // 3. 渲染右侧列表
            if (markers.length === 0) {
                emptyText.style.display = 'block';
                // 移除原有的列表条目
                const items = markerList.querySelectorAll('.marker-item');
                items.forEach(i => i.remove());
            } else {
                emptyText.style.display = 'none';
                const items = markerList.querySelectorAll('.marker-item');
                items.forEach(i => i.remove());

                markers.forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'marker-item';
                    item.innerHTML = `
                        <div class="marker-info">
                            <span class="marker-name">${m.room}</span>
                            <span class="marker-coords">top: ${m.top}%, left: ${m.left}%</span>
                        </div>
                        <button class="delete-btn" onclick="deleteMarker(${m.id})">删除</button>
                    `;
                    markerList.appendChild(item);
                });
            }

            // 4. 更新 JSON 预览 (过滤掉 ID)
            const cleanData = markers.map(m => ({
                room: m.room,
                top: m.top,
                left: m.left
            }));
            jsonOutput.textContent = JSON.stringify(cleanData, null, 4);
        }

        // 导出保存
        saveBtn.addEventListener('click', function() {
            if (markers.length === 0) {
                alert('当前还没有任何标记点！请先在大楼图片上点击打点。');
                return;
            }

            const cleanData = markers.map(m => ({
                room: m.room,
                top: m.top,
                left: m.left
            }));

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cleanData, null, 4));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href",     dataStr);
            downloadAnchor.setAttribute("download", "rooms_config.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });
    </script>
</body>
</html>
